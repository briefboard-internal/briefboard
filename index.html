<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BriefBoard — 業界ニュース</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0f; --surface:#13131a; --surface2:#1a1a24;
  --border:#2a2a38; --border2:#353548;
  --accent:#e2c97e; --accent2:#6fa882;
  --text:#eae8e2; --text-muted:#72727f; --text-dim:#3e3e50;
  --red:#c95555;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Noto Serif JP',serif;
  --sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:0.15;pointer-events:none;z-index:0;}

/* ── HEADER ── */
header{border-bottom:1px solid var(--border);padding:12px 0;position:sticky;top:0;background:rgba(12,12,15,0.96);backdrop-filter:blur(16px);z-index:200;}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 16px;}
.logo{display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.logo-mark{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--accent);letter-spacing:-1px;}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
@media(max-width:480px){.logo-sub{display:none;}}
.hdr-right{display:flex;align-items:center;gap:10px;}
.next-upd{font-family:var(--mono);font-size:10px;color:var(--text-muted);}
.next-upd span{color:var(--accent2);}
@media(max-width:600px){.next-upd{display:none;}}
.btn-refresh{background:none;border:1px solid var(--border2);color:var(--text-muted);padding:5px 12px;font-family:var(--mono);font-size:10px;cursor:pointer;border-radius:3px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent);}
.btn-refresh:disabled{opacity:0.35;cursor:not-allowed;}
/* 言語切替 */
.lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;}
.lang-btn{background:none;border:none;color:var(--text-muted);padding:5px 9px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;white-space:nowrap;}
.lang-btn.on{background:var(--accent);color:var(--bg);font-weight:500;}
.lang-btn:not(.on):hover{color:var(--text);}

/* ── PANELS ── */
.ctrl-wrap{padding:12px 12px 0;position:relative;z-index:1;}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:768px){.ctrl-grid{grid-template-columns:1fr;gap:8px;}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;min-width:0;width:100%;}
@media(max-width:600px){
  .ctrl-wrap{padding:8px 8px 0;}
  .panel{padding:10px 12px;}
}
.panel-lbl{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}

/* keyword */
.kw-row{display:flex;gap:6px;}
.kw-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--sans);font-size:14px;border-radius:3px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.kw-input::placeholder{color:var(--text-dim);}
.kw-input:focus{border-color:var(--accent);}
.btn-add{background:var(--accent);border:none;color:var(--bg);padding:8px 12px;font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;border-radius:3px;letter-spacing:0.5px;transition:opacity 0.2s;white-space:nowrap;flex-shrink:0;}
.btn-add:hover{opacity:0.85;}
.btn-add:active{opacity:0.7;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;min-height:14px;}
.tag{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--accent);color:var(--accent);padding:4px 8px;font-size:11px;border-radius:2px;cursor:default;animation:tagIn 0.2s ease;}
@keyframes tagIn{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
.tag-x{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0;line-height:1;min-width:16px;min-height:16px;display:flex;align-items:center;justify-content:center;}
.tag-x:hover{color:var(--red);}
.no-tags{font-size:11px;color:var(--text-dim);font-style:italic;line-height:24px;}

/* sources */
.src-header{display:flex;align-items:center;justify-content:space-between;}
.btn-toggle-all{font-family:var(--mono);font-size:10px;color:var(--text-muted);background:none;border:none;cursor:pointer;letter-spacing:0.5px;transition:color 0.2s;padding:0;white-space:nowrap;}
.btn-toggle-all:hover{color:var(--accent);}
.src-groups{display:flex;flex-direction:column;gap:8px;}
.src-group-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.src-chips{display:flex;flex-wrap:wrap;gap:4px;}
.src-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:4px 8px;font-size:11px;border-radius:3px;cursor:pointer;transition:all 0.15s;user-select:none;-webkit-tap-highlight-color:transparent;}
@media(max-width:600px){.src-chip{font-size:10px;padding:4px 7px;}}
.src-chip:hover,.src-chip:active{border-color:var(--border2);color:var(--text);}
.src-chip.on{border-color:var(--accent2);color:var(--text);}
.src-chip.on .chip-dot{background:var(--accent2);}
.chip-dot{width:4px;height:4px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background 0.15s;}

/* ── COLUMNS AREA ── */
.cols-wrap{padding:14px 12px 40px;position:relative;z-index:1;}
@media(max-width:600px){.cols-wrap{padding:10px 8px 40px;}}
.cols-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cols-title{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.cols-info{font-family:var(--mono);font-size:10px;color:var(--text-muted);}

/* Desktop & Mobile: horizontal scroll */
.columns-grid{
  display:flex;
  flex-direction:row;
  gap:12px;
  overflow-x:auto;
  padding-bottom:16px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  align-items:start;
}
/* スクロールバーをPCでも目立つように */
.columns-grid::-webkit-scrollbar{height:6px;}
.columns-grid::-webkit-scrollbar-track{background:var(--surface2);border-radius:3px;}
.columns-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.columns-grid::-webkit-scrollbar-thumb:hover{background:var(--accent2);}
@media(max-width:600px){
  .columns-grid{gap:10px;padding-bottom:12px;}
}

/* ── COLUMN ── */
.col{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;animation:colIn 0.3s ease both;flex-shrink:0;width:300px;scroll-snap-align:start;}
@media(max-width:600px){
  .col{width:calc(100vw - 24px);max-width:380px;}
  .cols-wrap{padding:10px 8px 40px;}
}
@keyframes colIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.col-head{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:9px 10px;border-bottom:1px solid var(--border);background:var(--surface2);}
.col-kw{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;}
.col-count{font-family:var(--mono);font-size:10px;color:var(--text-muted);}
.col-tab{font-family:var(--mono);font-size:9px;padding:2px 7px;border:1px solid var(--border);border-radius:20px;color:var(--text-dim);cursor:pointer;transition:all 0.15s;white-space:nowrap;user-select:none;}
.col-tab.on{border-color:var(--accent);color:var(--accent);}
.col-tab:hover:not(.on){border-color:var(--border2);color:var(--text-muted);}
.col-body{display:flex;flex-direction:column;}

/* ── NEWS CARD ── */
.n-card{padding:13px 14px;border-bottom:1px solid var(--border);text-decoration:none;display:block;position:relative;transition:background 0.12s;-webkit-tap-highlight-color:transparent;}
.n-card:last-child{border-bottom:none;}
.n-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);transform:scaleY(0);transition:transform 0.18s;transform-origin:bottom;}
.n-card:hover,.n-card:active{background:var(--surface2);}
.n-card:hover::before{transform:scaleY(1);}
.n-meta{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.n-src{font-family:var(--mono);font-size:9px;color:var(--accent2);letter-spacing:0.8px;text-transform:uppercase;}
.n-dot{width:2px;height:2px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
.n-time{font-family:var(--mono);font-size:9px;color:var(--text-muted);}
.n-flag{font-size:10px;margin-left:auto;}
.n-title{font-family:var(--serif);font-size:14px;line-height:1.6;color:var(--text);transition:color 0.12s;}
.n-card:hover .n-title,.n-card:active .n-title{color:var(--accent);}

/* skeleton */
.sk-card{padding:13px 14px;border-bottom:1px solid var(--border);}
.sk-card:last-child{border-bottom:none;}
.sk{background:var(--surface2);border-radius:2px;animation:shimmer 1.4s infinite;display:block;}
.sk.s{height:9px;width:90px;margin-bottom:8px;}
.sk.l{height:12px;width:86%;}
.sk.m{height:12px;width:58%;margin-top:5px;}
@keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:0.65}}

/* empty */
.col-empty{padding:28px 14px;text-align:center;}
.col-empty-icon{font-size:22px;opacity:0.3;margin-bottom:8px;}
.col-empty-txt{font-size:11px;color:var(--text-dim);line-height:1.7;}

/* error banner */
.err-banner{background:rgba(201,85,85,0.12);border:1px solid rgba(201,85,85,0.3);border-radius:6px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:#e08080;line-height:1.6;display:none;}
.err-banner.show{display:block;}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:12px 16px;position:relative;z-index:1;}
.ft{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ft-txt{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.pills{display:flex;gap:5px;flex-shrink:0;}
.pill{font-family:var(--mono);font-size:9px;padding:3px 8px;border:1px solid var(--border);color:var(--text-muted);border-radius:20px;}
.pill.on{border-color:var(--accent2);color:var(--accent2);}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent2);margin-right:5px;animation:pulse 2s infinite;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── COLUMN MOVE BUTTONS ── */
.col-move-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;color:var(--accent2);font-size:11px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex-shrink:0;transition:all 0.15s;-webkit-tap-highlight-color:transparent;line-height:1;}
.col-move-btn:hover,.col-move-btn:active{background:var(--accent2);border-color:var(--accent2);color:var(--bg);}
.col-move-btn:disabled{opacity:0.15;cursor:default;pointer-events:none;}

/* ── CARD REORDER (↑↓, kept for reference) ── */
.n-card-wrap{position:relative;}
.card-reorder{display:none;}/* 無効化 — 列移動に統一 */
/* mobile swipe hint */
.swipe-hint{display:block;font-family:var(--mono);font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:10px;}

/* ── 翻訳ボタン ── */
.n-actions{margin-top:8px;display:flex;gap:6px;position:relative;flex-wrap:wrap;}
.n-trans-btn{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:3px 8px;text-decoration:none;letter-spacing:0.5px;transition:all 0.15s;white-space:nowrap;cursor:pointer;user-select:none;}
.n-trans-btn:hover{color:var(--accent);border-color:var(--accent);background:transparent;}
.trans-popup{display:none;position:absolute;bottom:calc(100% + 4px);left:0;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:6px;z-index:100;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.5);}
.trans-popup.open{display:block;}
.trans-opt{display:block;width:100%;font-family:var(--mono);font-size:11px;color:var(--text);padding:6px 10px;border-radius:3px;text-decoration:none;transition:background 0.1s;white-space:nowrap;background:none;border:none;cursor:pointer;text-align:left;}
.trans-opt:hover{background:var(--border);color:var(--accent);}
.trans-opt-label{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding:4px 10px 2px;letter-spacing:1px;text-transform:uppercase;}

/* ── タブ ── */

/* ── 出典クレジット ── */
.n-credit{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:5px;line-height:1.4;}
.n-credit-src{color:var(--accent2);}
.n-credit-domain{color:var(--text-dim);}
.archive-wrap{padding:0 12px 12px;margin-top:14px;position:relative;z-index:1;}
@media(max-width:600px){.archive-wrap{padding:0 8px 10px;margin-top:10px;}}
.archive-panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;}
.archive-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.archive-panel-title{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.archive-desc{font-size:11px;color:var(--text-muted);margin-bottom:14px;line-height:1.6;}
.archive-row{display:flex;gap:8px;margin-bottom:12px;}
.archive-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:var(--sans);font-size:14px;border-radius:3px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;min-width:0;}
.archive-input:focus{border-color:var(--accent);}
.archive-input::placeholder{color:var(--text-dim);}
.archive-period{background:var(--bg);border:1px solid var(--border);color:var(--text-muted);padding:9px 10px;font-family:var(--mono);font-size:11px;border-radius:3px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
.archive-period:focus{border-color:var(--accent);}
.archive-sites{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.arch-site-btn{font-family:var(--mono);font-size:10px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);background:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.arch-site-btn.on{border-color:var(--accent2);color:var(--accent2);}
.arch-site-btn:hover{border-color:var(--accent);color:var(--accent);}
.archive-go{background:none;border:1px solid var(--accent);color:var(--accent);padding:9px 20px;font-family:var(--mono);font-size:11px;cursor:pointer;border-radius:3px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;white-space:nowrap;}
.archive-go:hover{background:var(--accent);color:var(--bg);}
.archive-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.arch-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:5px 10px;text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.arch-link:hover{color:var(--accent);border-color:var(--accent);}
.arch-link-icon{font-size:12px;}
.archive-toggle{font-family:var(--mono);font-size:10px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:3px;padding:4px 10px;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;}
.archive-toggle:hover{color:var(--accent);border-color:var(--accent);}
.archive-body{display:none;}
.archive-body.open{display:block;}
/* カード内過去検索ボタン */
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">
      <span class="logo-mark">BriefBoard</span>
      <span class="logo-sub">業界ニュース</span>
    </div>
    <div class="hdr-right">
      <div class="lang-toggle">
        <button class="lang-btn on" id="langOrig" onclick="setLang('orig')">原文</button>
        <button class="lang-btn" id="langJa" onclick="setLang('ja')">日本語</button>
        <button class="lang-btn" id="langEn" onclick="setLang('en')">English</button>
      </div>
      <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">↻ 更新</button>
    </div>
  </div>
</header>

<div class="ctrl-wrap">
  <div class="ctrl-grid">
    <div class="panel">
      <div class="panel-lbl">▸ 監視キーワード</div>
      <div class="kw-row">
        <input class="kw-input" id="kwInput" placeholder="例: トヨタ、EV、半導体..." onkeydown="if(event.key==='Enter')addKw()">
        <button class="btn-add" onclick="addKw()">+ 追加</button>
      </div>
      <div class="tags" id="tagArea">
        <span class="no-tags">追加したキーワードが1列ずつ並びます</span>
      </div>
    </div>

  </div>
</div>

<div class="archive-wrap">
  <div class="archive-panel">
    <div class="archive-panel-head">
      <span class="archive-panel-title">📚 過去記事・動向検索</span>
      <button class="archive-toggle" onclick="toggleArchive()">▸ 開く</button>
    </div>
    <div class="archive-body" id="archiveBody">
      <p class="archive-desc">キーワードを入力して、Google News・Electrek・Bloomberg・Reutersなど各サービスの過去記事を横断検索します。期間も指定できます。</p>
      <div class="archive-row">
        <input class="archive-input" id="archInput" placeholder="例: Tesla battery, トヨタ EV..." onkeydown="if(event.key==='Enter')runArchive()">
        <select class="archive-period" id="archPeriod">
          <option value="">期間指定なし</option>
          <option value="w">直近1週間</option>
          <option value="m">直近1ヶ月</option>
          <option value="y">直近1年</option>
          <option value="y3">直近3年</option>
          <option value="y5">直近5年</option>
        </select>
      </div>
      <div class="archive-sites" id="archSites"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="archive-go" onclick="runArchive()">🔍 まとめて検索</button>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">選択したサービスが別タブで開きます</span>
      </div>
    </div>
  </div>
</div>

<div class="cols-wrap">
  <div class="err-banner" id="errBanner"></div>
  <div class="cols-meta">
    <div class="cols-title">ニュース</div>
    <div class="cols-info" id="colsInfo"></div>
  </div>
  <div class="swipe-hint" id="swipeHint">← 横にスクロールで全列表示 →</div>
  <div class="columns-grid" id="colsGrid"></div>
</div>

<footer>
  <div class="ft">
    <div class="ft-txt" id="ftTxt"><span class="live-dot"></span>BriefBoard</div>
  </div>
</footer>

<script>


// ══════════════════════════════════════════════
//  ALIAS MAP
// ══════════════════════════════════════════════
const ALIASES = {
  // 日本メーカー
  'トヨタ':['toyota','トヨタ'],'toyota':['toyota','トヨタ'],
  'ホンダ':['honda','ホンダ'],'honda':['honda','ホンダ'],
  '日産':['nissan','日産'],'nissan':['nissan','日産'],
  'スバル':['subaru','スバル'],'subaru':['subaru','スバル'],
  'マツダ':['mazda','マツダ'],'mazda':['mazda','マツダ'],
  '三菱':['mitsubishi','三菱'],'mitsubishi':['mitsubishi','三菱'],
  'スズキ':['suzuki','スズキ'],'suzuki':['suzuki','スズキ'],
  'ダイハツ':['daihatsu','ダイハツ'],'daihatsu':['daihatsu','ダイハツ'],
  'レクサス':['lexus','レクサス'],'lexus':['lexus','レクサス'],

// ══════════════════════════════════════════════
//  RSS PROXY — 3段階フォールバック
// ══════════════════════════════════════════════
async function fetchRSS(src) {
  const strategies = [
    () => fetchViaRss2Json(src.url, 100),
    () => fetchViaAllOrigins(src.url),
    () => fetchViaCorsproxy(src.url),
  ];
  for (const strategy of strategies) {
    try {
      const items = await strategy();
      if (items && items.length > 0) {
        return items.map(i => ({...i, source: src.name, flag: src.flag}));
      }
    } catch(e) { /* try next */ }
  }
  return [];
}

async function fetchViaRss2Json(url, count = 100) {
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=${count}`;
  const res = await fetch(api, {signal: AbortSignal.timeout(10000)});
  if (!res.ok) throw new Error('rss2json http error');
  const data = await res.json();
  if (data.status !== 'ok' || !data.items?.length) throw new Error('rss2json no items');
  return data.items.map(i => ({
    title: i.title||'',
    link: safeUrl(i.link) || safeUrl(i.guid) || '',
    pubDate: i.pubDate||''
  })).filter(i => i.link);
}

async function fetchViaAllOrigins(url) {
  const api = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(api, {signal: AbortSignal.timeout(10000)});
  if (!res.ok) throw new Error('allorigins http error');
  const data = await res.json();
  if (!data.contents) throw new Error('allorigins empty');
  return parseRSSXML(data.contents);
}

async function fetchViaCorsproxy(url) {
  const api = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(api, {signal: AbortSignal.timeout(10000)});
  if (!res.ok) throw new Error('corsproxy http error');
  return parseRSSXML(await res.text());
}

function safeUrl(u) {
  if (!u) return null;
  return (u.startsWith('http://') || u.startsWith('https://')) ? u : null;
}

function parseRSSXML(xml) {
  if (!xml) throw new Error('empty xml');
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item, entry'));
  if (!items.length) throw new Error('no items in xml');
  return items.map(item => {
    const titleRaw = item.querySelector('title')?.textContent?.trim() || '';
    const linkEl   = item.querySelector('link');
    const guid     = item.querySelector('guid')?.textContent?.trim() || '';
    const link = safeUrl(linkEl?.getAttribute('href'))
              || safeUrl(linkEl?.textContent?.trim())
              || safeUrl(guid)
              || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim()
                 || item.querySelector('updated')?.textContent?.trim()
                 || item.querySelector('published')?.textContent?.trim() || '';
    return { title: titleRaw, link, pubDate };
  }).filter(i => i.title && i.link);
}

function addKw() {
  const el = document.getElementById('kwInput');
  // カンマ・読点のみで分割（スペースはAND検索として単語内に保持）
  const words = el.value.split(/[,、,]+/).map(w => w.trim()).filter(Boolean);
  let added = 0;
  words.forEach(w => {
    if (keywords.length >= 20) return;
    if (!keywords.includes(w)) { keywords.push(w); added++; }
  });
  if (keywords.length >= 20 && added === 0 && words.length > 0) {
    alert('キーワードは最大20個までです。');
  } else if (keywords.length >= 20 && words.some(w => !keywords.includes(w))) {
    alert('上限20個に達しました。');
  }
  el.value = '';
  localStorage.setItem('bb_kw', JSON.stringify(keywords));
  renderTags();
  renderColumns();
}
function removeKw(w) {
  keywords = keywords.filter(k=>k!==w);
  localStorage.setItem('bb_kw', JSON.stringify(keywords));
  renderTags();
  renderColumns();
}
function renderTags() {
  const el = document.getElementById('tagArea');
  el.innerHTML = keywords.length === 0

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '取得中...'; }
  errorCount = 0;

  const srcs = ALL_SOURCES.filter(s => activeSrcs.includes(s.id));
  if (!srcs.length) { cachedItems = []; renderColumns(); if (btn) { btn.disabled = false; btn.textContent = '↻ 更新'; } return; }

  const results = await Promise.allSettled(srcs.map(s => fetchRSS(s)));
  cachedItems = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled' && r.value.length > 0) cachedItems.push(...r.value);
    else errorCount++;
  });
  cachedItems.sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0));

  // キャッシュクリア→再描画
  Object.keys(gnewsCache).forEach(k => delete gnewsCache[k]);
  renderColumns();
  if (btn) { btn.disabled = false; btn.textContent = '↻ 更新'; }
  document.getElementById('ftTxt').innerHTML = `<span class="live-dot"></span>最終更新 <span style="color:var(--accent2)">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</span>`;
}

function renderColumns() {
  const grid = document.getElementById('colsGrid');
  const info = document.getElementById('colsInfo');
  grid.innerHTML = '';

  if (!keywords.length) {
    info.textContent = cachedItems.length ? `${cachedItems.length} 件取得` : '';
    grid.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:40px 20px;">← キーワードを追加すると列が表示されます</div>';
    return;
  }
  // RSSが全滅でも列（ヘッダー＋空カード）は表示する

  info.textContent = `${keywords.length} 列 / ${cachedItems.length} 件取得`;
  keywords.forEach((kw, i) => {
    const terms = kw.split(/\s+/).filter(Boolean);
    const matched = cachedItems.filter(item => {
      const hay = (item.title + ' ' + (item.source||'')).toLowerCase();
      return terms.every(term => {
        const aliases = getAliases(term);
        return aliases.some(al => hay.includes(al.toLowerCase()));
      });
    });
    gnewsCache[kw.toLowerCase()] = matched; // キャッシュに保存
    const col = buildCol(kw, matched, i);
    col.style.animationDelay = `${i * 55}ms`;
    grid.appendChild(col);
  });
}

  countSpan.className = 'col-count';

  kwRow.style.cssText = 'display:flex;align-items:center;gap:4px;min-width:0;flex:1;overflow:hidden';

// 列を左右に移動（キーワード配列も連動）
function moveCol(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= keywords.length) return;
  [keywords[idx], keywords[newIdx]] = [keywords[newIdx], keywords[idx]];
  localStorage.setItem('bb_kw', JSON.stringify(keywords));
  renderTags();
  renderColumns();
}

    if (currentLang !== 'orig' && a.link) {
      const titleEl = card.querySelector('.n-title');
      translateTitle(a.link, a.title, currentLang, titleEl);

    body.appendChild(card);
  });
}

let translateCache = {};  // link -> ja/en translated title

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('bb_lang', lang);
  document.getElementById('langOrig').classList.toggle('on', lang === 'orig');
  document.getElementById('langJa').classList.toggle('on',   lang === 'ja');
  document.getElementById('langEn').classList.toggle('on',   lang === 'en');
  // 全カードのタイトルを更新
  document.querySelectorAll('.n-card[data-link]').forEach(card => {
    const link = card.getAttribute('data-link');
    const origTitle = card.getAttribute('data-orig');
    const titleEl = card.querySelector('.n-title');
    if (!titleEl) return;
    if (lang === 'orig') {
      titleEl.textContent = origTitle;
    } else if (translateCache[link + '|' + lang]) {
      titleEl.textContent = translateCache[link + '|' + lang];
    } else {
      titleEl.setAttribute('data-pending', lang);
      translateTitle(link, origTitle, lang, titleEl);
    }
  });
}

async function translateTitle(link, title, lang, el) {
  const cacheKey = link + '|' + lang;
  if (translateCache[cacheKey]) { el.textContent = translateCache[cacheKey]; return; }
  el.style.opacity = '0.5';
  try {
    const tl = lang === 'ja' ? 'ja' : 'en';
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${tl}&dt=t&q=${encodeURIComponent(title)}`;
    const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
    const data = await res.json();
    const translated = data?.[0]?.map(seg => seg?.[0] || '').join('') || title;
    translateCache[cacheKey] = translated;
    // まだ同じ言語モードなら反映
    if (currentLang === lang) el.textContent = translated;
  } catch(e) {
    // 翻訳失敗時は原文を維持
  } finally {
    el.style.opacity = '';
  }
}

function renderArchSites() {
  document.getElementById('archSites').innerHTML = ARCH_SERVICES.map(s =>
    `<button class="arch-site-btn${archSelected.includes(s.id)?' on':''}" onclick="toggleArchSite('${s.id}')">${s.icon} ${s.label}</button>`
  ).join('');
}
function toggleArchSite(id) {
  archSelected = archSelected.includes(id) ? archSelected.filter(x=>x!==id) : [...archSelected, id];
  renderArchSites();
}
function toggleArchive() {
  const body = document.getElementById('archiveBody');
  const btn = document.querySelector('.archive-toggle');
  const open = body.classList.toggle('open');
  btn.textContent = open ? '▾ 閉じる' : '▸ 開く';
}
function runArchive() {
  const q = document.getElementById('archInput').value.trim();
  if (!q) { document.getElementById('archInput').focus(); return; }
  const period = document.getElementById('archPeriod').value;
  const services = ARCH_SERVICES.filter(s => archSelected.includes(s.id));
  if (!services.length) { alert('検索サービスを1つ以上選択してください'); return; }
  services.forEach(s => window.open(s.fn(q, period), '_blank'));
}

// キーワードタグクリックで過去検索欄に自動入力
function fillArchive(kw) {
  const body = document.getElementById('archiveBody');
  if (!body.classList.contains('open')) toggleArchive();
  document.getElementById('archInput').value = kw;
  document.getElementById('archInput').focus();
  document.getElementById('archiveBody').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function relTime(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return '';
  const m = Math.floor((Date.now()-dt)/60000);
  let rel;
  if(m<1) rel='たった今';
  else if(m<60) rel=`${m}分前`;
  else if(m<1440) rel=`${Math.floor(m/60)}時間前`;
  else rel=`${Math.floor(m/1440)}日前`;
  // 絶対日時（yyyy/MM/dd HH:mm）
  const abs = dt.toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  return `${rel} <span style="color:var(--text-dim);font-size:9px">(${abs})</span>`;
}

init();
</script>
